# Development only — do NOT deploy with these default credentials
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cortexmem_cloud
      POSTGRES_USER: cortexmem
      POSTGRES_PASSWORD: ${CORTEXMEM_DB_PASSWORD:-cortexmem_dev}
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  cortexmem-cloud:
    image: ghcr.io/pablocalofatti/cortexmem:latest
    environment:
      DATABASE_URL: postgres://cortexmem:${CORTEXMEM_DB_PASSWORD:-cortexmem_dev}@postgres:5432/cortexmem_cloud
    ports: ["8080:8080"]
    depends_on: [postgres]

volumes:
  pgdata:
